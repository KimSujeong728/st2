<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테이블1</title>
</head>
<body>
  <!-- 3줄 4칸 표만들기 -->
   <!-- row 행 cell 데이터가 들어가는 영역(td)  -->
  <table border="1">
    <!-- tr*3>td*4>{내용} -->
     <tr>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
     </tr>
     <tr>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
     </tr>
     <tr>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
     </tr>
  </table>
  <table border="1" width="100%">
    <!-- 2행 3열 테이블 -->
     <!-- tr*2>td*3>{내용} -->
     <tr>
      <td>내용</td>
      <td>내용</td>
      <td>내용</td>
     </tr>
     <tr>
      <td>가나다 라마바</td>
      <td>가나다</td>
      <td>내용</td>
     </tr>
  </table>
  <hr>
  <p>블록레벨</p>
  <span>가나다</span>

  <!-- tr*4>td*5{내용} -->
  <table border="1">
  <tr>
    <td>내용</td>
    <td>내용</td>
    <td>내용</td>
    <td>내용</td>
    <td>내용</td>
  </tr>
  <tr>
    <td>내용</td>
    <td>내용</td>
    <td>내용</td>
    <td>내용</td>
    <td>내용</td>
  </tr>
  <tr>
    <td>내용</td>
    <td>내용</td>
    <td>내용</td>
    <td>내용</td>
    <td>내용</td>
  </tr>
  <tr>
    <td>내용</td>
    <td>내용</td>
    <td>내용</td>
    <td>내용</td>
    <td>내용</td>
  </tr></table>

<!-- 첫번째 row 표머리말 2,3 표 본문 마지막 row 표바닥글 머리글 -> 제목데이타 
 2,3,4 -> 1칸은 제목 2,3,4,5칸 데이타 -->
 <table border="1">
  <thead>
    <!-- 1줄 4칸 제목데이터 -->
    <!-- tr>th*5>{제목$}  -->
    <tr>
      <th>제목1</th>
      <th>제목2</th>
      <th>제목3</th>
      <th>제목4</th>
      <th>제목5</th>
    </tr> 
  </thead>

  <tbody>
    <!-- tr*2>th+td*4>{내용$@2} -->
    <tr>
      <th>제목</th>
      <td>내용2</td>
      <td>내용3</td>
      <td>내용4</td>
      <td>내용5</td>
    </tr>
    <tr>
      <th>제목</th>
      <td>내용2</td>
      <td>내용3</td>
      <td>내용4</td>
      <td>내용5</td>
    </tr>
  </tbody>

  <tfoot>
    <!-- tr>th+td*4{내용$@2} -->
    <tr>
      <th>제목</th>
      <td>내용2</td>
      <td>내용3</td>
      <td>내용4</td>
      <td>내용5</td>
    </tr>
  </tfoot>
 </table>
</body>
</html>
