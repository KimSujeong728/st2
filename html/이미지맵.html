<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이미지맵</title>
</head>
<body>
  <h1>이미지에 링크하기</h1>
  <hr>
  <!-- 태그를 감싸서 태그를 만드는 emmet
   emmet : 약어로 랩핑 -->
  <div class="exam">
    <a href="https://github.com" class="sample">
      <img src="asset/logo.png" alt="정보력이 있으면 작성"></a></div>

  <h2>하나의 이미지에 여러개 링크 이미지맵</h2>
      <div class="exam">
    <!-- 하나의 이미지에 여러개의 링크를 걸때 -->
    <img src="image/imagemap-sample.jpg" alt="이미지맵 연습">

    <!-- Image Map Generated by http://www.image-map.net/ -->
<img src="image/imagemap-sample.jpg" usemap="#image-map1">

<!-- name속성의 이름은 문서내에 유일해야합니다. -->
<map name="image-map1">
    <area target="_blank" alt="네이버로 이동" title="네이버로 이동" href="https://www.naver.com" coords="73,354,269,501" shape="rect">
    <area target="_self" alt="깃허브로 이동" title="깃허브로 이동" href="https://www.github.com" coords="612,417,97" shape="circle">
    <area target="" alt="구글로 이동" title="구글로 이동" href="https://www.google.com" coords="279,204,225,267,399,369,399,273" shape="poly">
</map>
  </div>

</body>
</html>
