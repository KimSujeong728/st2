<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>border-radius2</title>
  <style>
    *{margin:0; padding:0;}
    body{
      margin: 50px;
    }
    .box{
      width: 300px;
      height: 400px;
      border: 1px solid #000;
      border-radius: 50px;
      overflow: hidden;
    }
    .child{
      background-color: rgba(247, 231, 127, 0.5);
      height: 100%;
    }
    /* 자식의 크기가 부모 크기가 넘쳐날때 overflow hidden */
  </style>
</head>
<body>
  <div class="box">
    <div class="child">Lorem ipsum, dolor sit amet consectetur adipisicing elit. Eligendi illum illo maiores ea perferendis cumque nobis. Quod, nesciunt. Veritatis, architecto.</div>
  </div>
</body>
</html>
