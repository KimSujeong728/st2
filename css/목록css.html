<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>목록 관련 css</title>
  <style>
    *{margin:0; padding:0;}
    body{margin:30px}
    li{background-color: #ccc;}
    ol.exam1, ul.exam1{border: 1px solid #f00; 
      padding: 3em; /*ol, ul 블릿 글머리표를 화면 표시가 문제일 때 padding-left 확인*/ 
      overflow: visible;
      list-style: none;}/*ol, ul의 글머리표를 사용하지 않을 때*/
  </style>
</head>
<body>
  <!-- ul>li*3>{menu$} -->
  <ul class="exam1">
    <li>menu1</li>
    <li>menu2</li>
    <li>menu3</li>
  </ul>
  <ol class="exam1">
    <li>menu1</li>
    <li>menu2</li>
    <li>menu3</li>
  </ol>

  <!-- .exam2>ol>li*3>{내용$} -->
  <div class="exam2">
    <ol>
      <li>내용1</li>
      <li>내용2</li>
      <li>내용3</li>
    </ol>
    <ul>
      <li>내용1</li>
      <li>내용2</li>
      <li>내용3</li>
    </ul>
  </div>
  <style>
    .exam2 ol, .exam2 ul{list-style: none;}
    .exam2 li{background-image: url(images/arrow-right.png);
      /* 구글 아이콘에서 다운로드 */
    background-repeat: no-repeat;
    padding-left: 20px;
    background-size: 18px;
    background-position: 0 4px;
    /* background: #ccc url(image/bg.jpg) center bottom/cover no-repeat fixed; */
    /* 단추표기법을 사용시 생략된 속성은 기본값으로 설정 */
    /* background: url(images/arrow-right.png)
    no-repeat:0 6px/12px;} */
  </style>
</body>
</html>
