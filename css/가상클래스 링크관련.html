<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가상클래스 링크관련</title>
  <style>
    li{color:#68f}
    /* a태그는 기본값이 파란색, 방문한 사이트는 href 보라색, active상태(클릭상태) 빨간색으로 color속성을 상속받지 X */
    /* :link{color:#333;} */
    /* a:link{color:#333}
    a:visited{color:#333;}
    a:hover{color:#68f;}
    a:active{color:#333;} */
    a:link,
    a:visited,
    a:active{color:#333; text-decoration: none;}
    a:hover{color:#68f;
    text-decoration: underline;}
    a:focus{
      color:#f00;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- ul>li*3>a>{메뉴$} -->
  <ul>
    <li><span>가상클래스</span></li>
    <li><a href="https://www.naver.com">메뉴1</a></li>
    <li><a href="https://www.google.com">메뉴2</a></li>
    <li><a href="https://www.daum.net">메뉴3</a></li>
  </ul>
</body>
</html>
