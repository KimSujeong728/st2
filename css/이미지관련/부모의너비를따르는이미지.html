<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부모의 너비를 따르는 이미지</title>
  <style>
    *{margin: 0; padding: 0;}
    .wrap{margin: 30px;}
    .img-wrap{
      /* width:auto; */
      background-color: #f00;
    }
    /* 부모의 너비랑 상관없이 이미지는 항상 부모의 너비를 따라서 자동 조절 */
    .img-wrap .img-wrap{
      width: 100%;
      /* heigth: auto; 이미지의 가로세로 비율을 유지 */
      display: block;
      opacity: 0.5;
    }
    /* 부모의 너비를 따르지만 자신의 크기보다는 더 커지지 않아야 할때 */
    .max-img{
      width: 80%;
      background-color: #0f0;
    }
    .max-img img{
      opacity: 0.5;
      /* 부모의 너비를 따르지만 자기 사이즈보다 커져버리는 태그 */
      /* width: 100%; */
      /* 부모의 너비를 따르지만 자기 사이즈를 유지하는 태그 */
      max-width: 100%;
    }
    /* 부모의 높이를 따르는 이미지 */
    .img-wrap2{
      background-color: #00f;
      height: 300px;
    }
    .img-wrap2 img{
      opacity: 0.5;
      height: 100%;
      /*  */
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="img-wrap">
      <img src="../images/smartbanner-01-03-pc.png" alt="원피스 할인이벤트">
    </div>
    <div class="max-img">
      <img src="../images/test img.png" alt="">
    </div>
    <div class="img-wrap2">
      <img src="../images/test img.png" alt="">
    </div>
  </div>
  <!-- //.wrap -->
</body>
</html>
