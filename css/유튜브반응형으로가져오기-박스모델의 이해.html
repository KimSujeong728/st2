<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>유튜브 반응형으로 가져오기-박스모델의 이해</title>
  <style>
    *{margin:0; padding:0;}
    body{margin: 50px;}
    /* 부모의 너비를 따르지만 768px보다 더이상 커지지 말아라 */
    .media-box{max-width: 768px;
    background-color: #bbb;
    }
    .iframe-wrap{
      background-color: #ccf;
      width: 600px; 
      height: 500px;
      padding-top: 500px;
      box-sizing: border-box;
      /* overflow: hidden; */
      position: relative;
    }
    .iframe-wrap .box{
      opacity: 0.5;
      background-color: #f00;
      /* 부모의 콘텐츠 영역(너비, 높이)을 기준으로 사용하겠다 */
      width: 100%;
      height: 100%;
      /* 가까운 조상중 position static을 제외한 좌표 설정값을 지정 */
      position: absolute;
      left: 0; top: 0;
    }
  </style>
</head>
<body>
  <div class="media-box">
    <div class="iframe-wrap">
      <div class="box">Lorem ipsum dolor sit amet consectetur adipisicing elit. Adipisci atque corporis quia ducimus, veritatis non omnis. Inventore qui temporibus fuga cumque illo dolore. Nihil soluta, neque deserunt veritatis molestias expedita.</div>
    </div>
  </div>
</body>
</html>
