<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>가상클래스 hover</title>
  <style>
    *{margin:0; padding:0;}
    body{margin: 20px;}
    .product, .product>div{
      box-sizing: border-box;
    }
    .product{
      width:300px;
      padding:30px;
      background-color: #ccc;
      margin-bottom: 30px;
    }
    .product .thumb{
      background-color: #f68;
      min-height: 200px;
      margin-bottom: 10px;
    }
    .product .desc{
      background-color: #68f;
    }

    /* 가상클래스는 웹에서 자주 발생하는 상태를 선택자
    :hover 마우스를 어떤 요소 위에 올려둔 상태  */
    /* 상품이미지 .thumb, 상품설명 .desc
    .thumb, .desc 부모인 .product */
    .product:hover .thumb{
      box-shadow: 1px 1px 20px rgba(102, 102, 102, 1);
    }
  </style>
</head>
<body>
  <!-- ul>li*2.product>div.thumb+div.desc -->
  <ul>
    <li class="product">
      <div class="thumb">이미지</div>
      <div class="desc">상품설명</div>
    </li>
    <li class="product">
      <div class="thumb">이미지</div>
      <div class="desc">상품설명</div>
    </li>
  </ul>
</body>
</html>
