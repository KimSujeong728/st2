<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오로라 메시 그라디언트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .exam {
            width: 100%;
            height: 100vh;
            background: 
                radial-gradient(ellipse at 30% 20%, rgb(129, 242, 165) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 20%, rgb(245, 232, 80) 10%, transparent 45%),
                radial-gradient(ellipse at 10% 20%, rgb(249, 103, 89) 30%, transparent 50%),
                radial-gradient(ellipse at 50% 10%, rgb(65, 164, 230) 30%, transparent 45%),
                radial-gradient(ellipse at 10% 10%, rgb(129, 242, 165) 0%, transparent 40%),
                linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            background-size: 200% 200%;
            position: relative;
        }

        .text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .text-container h1 {
            font-size: 48px;
            color: white;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            font-weight: 300;
            letter-spacing: 2px;
        }

        .text-container p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 20px;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="exam">
        <!-- 그라디언트 배경 요소 -->
    </div>
    
    <!-- 텍스트 요소 (분리됨) -->
    <div class="text-container">
        <h1>Aurora Mesh</h1>
        <p>여기에 텍스트를 입력하세요</p>
    </div>
</body>
</html>
