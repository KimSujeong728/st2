<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>position복습</title>
  <style>
    *{margin:0; padding:0;}
    .wrap{
      margin: 50px;
      background-color: #ccc;
      padding: 20px;
      
    }
    .section{
      background-color: #ddd;
      padding: 20px;
      
    }
    .parent{
      background-color: beige;
      padding: 20px;
      position: relative;/*position의 기준이 되는 조상에 적어보자, 자식 1배치가 달라짐. 
      단, position staticr값이 없는 조상이어야 함 */
    }
    .child:nth-child(1){
      background-color: magenta;
      padding: 10px;
      width: 50px; height: 50px;
      box-sizing: border-box;
      top: 0; left: 0;
      position: absolute;
    }
    .child:nth-child(2){
      background-color: cyan;
      padding: 10px;
      width: 50px; height: 50px;
      /* box-sizing: border-box; */
      right: 0; top: 0;
      position: relative;/*원위치*/
      position: fixed;/*브라우저 기준으로 배치*/
      position: absolute;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="section">
      <div class="parent">
        <div class="child">child1</div>
        <div class="child">child2</div>
      </div>
    </div>
  </div>
</body>
</html>
