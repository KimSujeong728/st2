<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수평수직 가운데 만들기</title>
  <!-- 웹폰트 불러오기 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
<!-- 

.noto-sans-kr-<uniquifier> {
  font-family: "Noto Sans KR", sans-serif;
  font-optical-sizing: auto;
  font-weight: <weight>;
  font-style: normal;
}
  .nanum-pen-script-regular {
  font-family: "Nanum Pen Script", cursive;
  font-weight: 400;
  font-style: normal;
}
 -->
<style>
  *{margin:0; padding:0; box-sizing: border-box;}

  .exam{
    /* 브라우저 수평 수직 가득 사용하기 */
    width: 100%; height: 100vh;
    background-color: #ccc;
    /* 인라인 .text-wrap을 수평정렬 */
    text-align: center;
    /* 자식의 수직정렬을 가운데 */
    align-content: center;

    /* 그라이언트 */
          background: 
        radial-gradient(ellipse 800px 600px at 15% 20%, rgba(75, 160, 230, 0.8), transparent 40%),
        radial-gradient(ellipse 700px 500px at 85% 30%, rgba(245, 232, 80, 0.7), transparent 40%),
        radial-gradient(ellipse 900px 700px at 50% 70%, rgba(199, 74, 244, 0.6), transparent 45%),
        radial-gradient(ellipse 600px 500px at 25% 75%, rgba(249, 103, 89, 0.7), transparent 40%),
        radial-gradient(ellipse 750px 550px at 75% 60%, rgba(75, 160, 230, 0.5), transparent 45%),
        linear-gradient(135deg, rgba(75, 160, 230, 0.3), transparent);
      background-attachment: fixed;
      position: relative;


  }
  .exam .text-wrap{
    display: inline-block;
  }
  .exam .text-wrap .title{
  font-family: "Nanum Pen Script", cursive;
  font-size: 200px;
  color: #fff;
  letter-spacing: 30px;/*자간 설정*/
  /* background-color: #f60;영역을 확인하기 위한 태그 */
  text-shadow: 10px 5px 6px rgba(142, 49, 49, 0.5);
}
.exam .text-wrap .desc{
  font-family: "Noto Sans KR", sans-serif;
  font-size: 30px;
  color: #fff;
  margin-top: -50px;
  /* background-color: #0f0;영역을 확인하기 위한 태그 */
  letter-spacing: 10px;
  font-weight: 100;
  }
</style>
</head>
<body>
  <!-- .exam>.text-wrap>div.title+div.desc -->
  <div class="exam">
    <div class="text-wrap">
      <div class="title">SALE</div>
      <div class="desc">여름을 전하는 감사 인사</div>
    </div>
  </div>
</body>
</html>
