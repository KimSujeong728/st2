<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오로라 메시 그라디언트</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      width: 100%;
    }

    body {
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", "Segoe UI", sans-serif;
      color: #ffffff;
      background-color: #06030f;
    }

    .exam {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .aurora-background {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 20% 30%, rgba(129, 242, 165, 0.55), transparent 24%),
                  radial-gradient(circle at 75% 25%, rgba(245, 232, 80, 0.45), transparent 18%),
                  radial-gradient(circle at 55% 70%, rgba(249, 103, 89, 0.35), transparent 26%),
                  radial-gradient(circle at 55% 40%, rgba(255, 0, 255, 0.33), transparent 20%),
                  radial-gradient(circle at 40% 60%, rgba(231, 202, 14, 0.25), transparent 18%);
      filter: blur(12px);
      mix-blend-mode: screen;
    }

    .aurora-background::before,
    .aurora-background::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(129, 242, 165, 0.22), transparent 18%),
                  radial-gradient(circle at 80% 45%, rgba(255, 0, 255, 0.18), transparent 16%),
                  radial-gradient(circle at 25% 75%, rgba(245, 232, 80, 0.16), transparent 20%);
      transform: translateZ(0);
    }

    .aurora-background::after {
      background: radial-gradient(circle at 60% 25%, rgba(249, 103, 89, 0.19), transparent 20%),
                  radial-gradient(circle at 15% 55%, rgba(231, 202, 14, 0.14), transparent 22%),
                  radial-gradient(circle at 85% 70%, rgba(255, 0, 255, 0.14), transparent 24%);
      filter: blur(18px);
      opacity: 0.85;
    }

    .content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 960px;
      text-align: center;
      padding: 3rem 2rem;
    }

    .content h1 {
      font-size: clamp(2.4rem, 5vw, 4.6rem);
      letter-spacing: 0.14em;
      margin-bottom: 1rem;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.18);
    }

    .content p {
      font-size: clamp(1rem, 1.4vw, 1.4rem);
      line-height: 1.8;
      color: #f6f4ff;
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.22);
    }

    .text-placeholder {
      display: inline-block;
      margin-top: 1.8rem;
      padding: 0.85rem 1.6rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-weight: 700;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <section class="exam">
    <div class="aurora-background"></div>
    <div class="content">
      <h1>오로라 메시 그라디언트</h1>
      <p>정적인 메시 형태의 오로라 배경을 CSS로 구현했습니다. 텍스트는 별도로 분리되어 항상 선명하게 유지됩니다.</p>
      <span class="text-placeholder">여기에 텍스트를 넣어주세요</span>
    </div>
  </section>
</body>
</html>
