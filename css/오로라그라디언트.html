<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오로라 메시 그라디언트2</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .exam {
      width: 100%;
      height: 100vh;
      background: 
        radial-gradient(ellipse 800px 600px at 15% 20%, rgba(75, 160, 230, 0.8), transparent 40%),
        radial-gradient(ellipse 700px 500px at 85% 30%, rgba(245, 232, 80, 0.7), transparent 40%),
        radial-gradient(ellipse 900px 700px at 50% 70%, rgba(199, 74, 244, 0.6), transparent 45%),
        radial-gradient(ellipse 800px 700px at 20% 75%, rgba(249, 103, 89, 0.7), transparent 40%),
        radial-gradient(ellipse 750px 550px at 75% 60%, rgba(75, 160, 230, 0.5), transparent 45%),
        linear-gradient(135deg, rgba(75, 160, 230, 0.3), transparent);
         /* background-attachment: fixed;
      position: relative; */
      background-size: 110% 100%, 100% 130%, 150% 200%, 120% 130%, 220% 220%, 190% 190%, 100% 100%;
      background-position: 0% 0%, 100% 100%, 0% 100%, 50% 50%, 100% 0%, 0% 50%, 0% 0%;
    }

    .content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 10;
    }

    .text-container {
      text-align: center;
      color: white;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
      font-size: 48px;
      font-weight: bold;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="exam">
    <div class="content">
      <div class="text-container">
        <!-- 텍스트 내용은 여기에 입력 -->
      </div>
    </div>
  </div>
</body>
</html>
